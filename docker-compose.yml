version: '3.8'

services:
  tweet-tracker:
    build: .
    container_name: tweet-tracker
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./settings.json:/app/settings.json
      - ./.env:/app/.env
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - DB_PATH=/app/data/tweets.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
